# BookClaw Docker Compose
# Secure deployment with resource limits and isolation

services:
  bookclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bookclaw
    restart: unless-stopped
    ports:
      - "3847:3847"  # Gateway + Studio (all interfaces; needed for VirtualBox NAT port forwarding)
      - "3848:3848"  # Standalone Chat app (enabled when BOOKCLAW_CHAT_PORT is set)
    volumes:
      # Persist workspace data on a host bind-mount (backup/share friendly;
      # default lives outside the repo). Override with BOOKCLAW_WORKSPACE_PATH.
      - ${BOOKCLAW_WORKSPACE_PATH:-/home/paul/bookclaw-workspace}:/app/workspace
      # Persist backup snapshots on a host bind-mount (kept outside the
      # workspace so restores can't clobber them). Override with BOOKCLAW_BACKUP_PATH.
      - ${BOOKCLAW_BACKUP_PATH:-/home/paul/bookclaw-backups}:/app/backups
      # Persist vault (encrypted credentials)
      - bookclaw-vault:/app/config/.vault
      # Author OS tools (read-only mount for templates/references)
      - ${AUTHOR_OS_PATH:-~/author-os}:/app/author-os:ro
      # Optional: keep the live FTS index SQLite DB OFF the workspace bind-mount
      # (e.g. when the workspace is a cloud-synced folder — a live SQLite DB must
      # not be synced). Uncomment + pair with BOOKCLAW_DB_DIR=/app/db below.
      # - ${BOOKCLAW_DB_HOST_PATH:-/home/paul/bookclaw-db}:/app/db
    environment:
      - NODE_ENV=production
      - BOOKCLAW_VAULT_KEY=${BOOKCLAW_VAULT_KEY:-}
      # Stable auth token across deploys (else each fresh container generates a
      # new one and open dashboard tabs 401 until reloaded). Written to
      # docker/.env by deploy.sh, sourced from the repo .env.
      - BOOKCLAW_AUTH_TOKEN=${BOOKCLAW_AUTH_TOKEN:-}
      # Bind to all interfaces inside the container so the published port is
      # reachable from the LAN. Set to 127.0.0.1 to restore localhost-only.
      - BOOKCLAW_BIND=${BOOKCLAW_BIND:-0.0.0.0}
      # Date-time display version (V5.MM.DD.HH.MM) stamped by deploy.sh at build
      # time, written to docker/.env. Shown in the banner, /api/status, and the
      # dashboard. Unset (e.g. local dev) → the app falls back to a boot-time value.
      - BOOKCLAW_VERSION=${BOOKCLAW_VERSION:-}
      # Chat app second port. Unset = chat app disabled. Set to 3848 to enable.
      - BOOKCLAW_CHAT_PORT=${BOOKCLAW_CHAT_PORT:-}
      # Cross-origin browser origins (comma-separated). Required for LAN chat access.
      - BOOKCLAW_CORS_ORIGINS=${BOOKCLAW_CORS_ORIGINS:-}
      # Backup root inside the container (the bind-mount above).
      - BOOKCLAW_BACKUP_DIR=/app/backups
      # Relocate the FTS index SQLite DB off the workspace (default = in
      # workspace/memory). Set to an in-container path (e.g. /app/db) and pair
      # with the /app/db bind-mount above to keep the live DB on a non-synced disk.
      - BOOKCLAW_DB_DIR=${BOOKCLAW_DB_DIR:-}
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Security: No privilege escalation
    security_opt:
      - no-new-privileges:true
    # Network: Allow outbound for AI APIs and research
    networks:
      - bookclaw-net

  # Optional: Ollama for free local AI
  # Uncomment to enable — requires 4-8GB extra RAM in the VM
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: bookclaw-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '4.0'
  #         memory: 8G
  #   networks:
  #     - bookclaw-net
  #   # Pull default model on first run
  #   # Run: docker exec bookclaw-ollama ollama pull llama3.2

networks:
  bookclaw-net:
    driver: bridge

volumes:
  bookclaw-vault:
