<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>BookClaw · Chat</title>
<!-- Token bridge — do not rename either side. The chat server injects the bearer token
     and API base into the placeholders below at serve time (gateway/src/init/phase-12-chat-http.ts),
     and @bookclaw/shared (api.ts/socket.ts) reads them from window globals. Copy
     this <script> verbatim into any other app entry; changing the global names yields silent 401s.
     Each PLACEHOLDER name must differ from its window VARIABLE name — replaceAll would
     otherwise rewrite the variable too and syntax-error the whole script (the bug that
     broke chat until 2026-06-12). (Keep this comment free of the placeholder literals
     so the serve-time replace doesn't copy the token into the comment.) -->
<script>window.__BOOKCLAW_TOKEN__='__BOOKCLAW_AUTH_TOKEN__';window.__BOOKCLAW_API_BASE__='__BOOKCLAW_API_BASE_URL__';</script>
</head><body><div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body></html>
